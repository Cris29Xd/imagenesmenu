<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Menú — El Rincón del Puerto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:#111827;color:#e5e7eb;min-height:100vh;}

/* ── Header ── */
header{
  background:#1f2937;
  padding:1rem 1.75rem;
  border-bottom:2px solid #d4af37;
  display:flex;align-items:center;gap:0.75rem;
}
header h1{font-family:'Playfair Display',serif;color:#d4af37;font-size:1.35rem;}
header p{color:#9ca3af;font-size:0.8rem;margin-top:0.1rem;}

/* ── Layout ── */
.app{display:grid;grid-template-columns:420px 1fr;height:calc(100vh - 62px);}

.editor{background:#1f2937;overflow-y:auto;padding:1.25rem;border-right:1px solid #374151;}
.preview-panel{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:2rem 1.5rem;overflow-y:auto;background:#0f172a;gap:1.25rem;
}

/* ── Cards ── */
.card{background:#111827;border-radius:10px;padding:1.1rem;margin-bottom:0.9rem;border:1px solid #1e293b;}
.card h3{color:#d4af37;font-size:0.73rem;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:0.9rem;}

/* ── Inputs ── */
label{display:block;font-size:0.76rem;color:#9ca3af;margin-bottom:0.25rem;}
input[type=text],select{
  width:100%;background:#1f2937;border:1px solid #374151;
  color:#e5e7eb;padding:0.45rem 0.7rem;border-radius:6px;
  font-size:0.84rem;margin-bottom:0.8rem;font-family:'Lato',sans-serif;
  transition:border-color .2s;
}
input[type=text]:focus,select:focus{outline:none;border-color:#d4af37;}

input[type=color]{
  width:38px;height:34px;border:2px solid #374151;border-radius:6px;
  cursor:pointer;background:transparent;padding:2px;margin-bottom:0;
}
input[type=range]{width:100%;accent-color:#d4af37;cursor:pointer;}

/* ── Color grid ── */
.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.8rem;}
.color-item{display:flex;align-items:center;gap:0.5rem;}
.color-item label{margin-bottom:0;font-size:0.76rem;}

/* ── Range row ── */
.range-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.8rem;}
.range-row label{margin-bottom:0;white-space:nowrap;font-size:0.76rem;}
.range-val{font-size:0.76rem;color:#d4af37;min-width:34px;text-align:right;}

/* ── Upload zone ── */
.upload-zone{
  border:2px dashed #374151;border-radius:8px;padding:1.1rem;
  text-align:center;cursor:pointer;transition:all .2s;
  margin-bottom:0.8rem;position:relative;
}
.upload-zone:hover{border-color:#d4af37;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone .icon{font-size:1.4rem;display:block;margin-bottom:0.3rem;}
.upload-zone p{color:#6b7280;font-size:0.8rem;}
.upload-zone.ok{border-color:#10b981;}
.upload-zone.ok p{color:#10b981;}

/* ── Format tabs ── */
.format-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.4rem;margin-bottom:0.8rem;}
.ftab{
  padding:0.5rem 0.25rem;text-align:center;border-radius:6px;cursor:pointer;
  border:1px solid #374151;background:#1f2937;color:#9ca3af;
  font-size:0.75rem;transition:all .2s;
}
.ftab .ratio{font-size:0.95rem;display:block;margin-bottom:0.1rem;}
.ftab.active{background:#d4af37;color:#111827;border-color:#d4af37;font-weight:700;}

/* ── Buttons ── */
button{cursor:pointer;border:none;border-radius:6px;font-family:'Lato',sans-serif;font-size:0.82rem;transition:all .2s;}
.btn-ghost{background:transparent;color:#9ca3af;border:1px solid #374151;padding:0.45rem 0.9rem;}
.btn-ghost:hover{background:#1f2937;color:#e5e7eb;}
.btn-del{background:#7f1d1d;color:#fca5a5;padding:0.25rem 0.55rem;font-size:0.72rem;}
.btn-del:hover{background:#991b1b;}
.btn-sm{padding:0.3rem 0.6rem;font-size:0.75rem;}

.gen-btn{
  width:100%;background:#d4af37;color:#111827;font-weight:700;
  font-size:0.92rem;padding:0.75rem;border-radius:8px;border:none;cursor:pointer;
  margin-top:0.5rem;transition:all .2s;letter-spacing:.3px;
}
.gen-btn:hover{background:#f0c040;box-shadow:0 4px 20px rgba(212,175,55,.35);}

/* ── Category editor ── */
.cat-list{display:flex;flex-direction:column;gap:0.7rem;}
.cat-card{background:#1f2937;border-radius:8px;padding:0.85rem;border:1px solid #374151;}
.cat-name-row{display:flex;gap:0.4rem;align-items:center;margin-bottom:0.65rem;}
.cat-name-row input{margin-bottom:0;flex:1;}
.items-list{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:0.5rem;}
.item-row{display:grid;grid-template-columns:1fr 72px 28px;gap:0.35rem;align-items:center;}
.item-row input{margin-bottom:0;}

/* ── Preview ── */
#previewImg{
  border-radius:10px;
  box-shadow:0 20px 60px rgba(0,0,0,.65);
  max-width:100%;
  max-height:calc(100vh - 190px);
  object-fit:contain;
  display:block;
}
.preview-label{color:#4b5563;font-size:0.75rem;text-align:center;}

.dl-btn{
  background:#d4af37;color:#111827;font-weight:700;
  padding:0.7rem 2rem;font-size:0.92rem;border-radius:8px;
  border:none;cursor:pointer;display:flex;align-items:center;gap:0.5rem;
}
.dl-btn:hover{background:#f0c040;}
canvas{display:none;}

@media(max-width:860px){
  .app{grid-template-columns:1fr;height:auto;}
  .editor{height:auto;}
  .preview-panel{min-height:60vh;}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>Generador de Menú</h1>
    <p>El Rincón del Puerto — crea la imagen de tu menú en segundos</p>
  </div>
</header>

<div class="app">

  <!-- ═══════════════ EDITOR ═══════════════ -->
  <div class="editor">

    <div class="card">
      <h3>🏪 Restaurante</h3>
      <label>Nombre</label>
      <input type="text" id="restName" value="El Rincón del Puerto" oninput="schedule()">
      <label>Subtítulo / eslogan</label>
      <input type="text" id="subtitle" value="Mariscos & Cocina del Mar" oninput="schedule()">
    </div>

    <div class="card">
      <h3>🖼 Imagen de fondo</h3>
      <div class="upload-zone" id="uploadZone">
        <input type="file" accept="image/*" onchange="loadBg(this)">
        <span class="icon">📷</span>
        <p>Ya tiene foto de fondo — haz clic para cambiarla</p>
      </div>
      <div class="range-row">
        <label>Oscuridad del fondo</label>
        <input type="range" id="overlay" min="15" max="88" value="55" oninput="document.getElementById('ovVal').textContent=this.value+'%';schedule()">
        <span class="range-val" id="ovVal">55%</span>
      </div>
    </div>

    <div class="card">
      <h3>📐 Formato</h3>
      <div class="format-tabs">
        <div class="ftab active" onclick="setFmt('square',this)"><span class="ratio">1:1</span>Cuadrado</div>
        <div class="ftab"       onclick="setFmt('portrait',this)"><span class="ratio">4:5</span>Retrato</div>
        <div class="ftab"       onclick="setFmt('story',this)"><span class="ratio">9:16</span>Historia</div>
      </div>
    </div>

    <div class="card">
      <h3>🎨 Colores</h3>
      <div class="color-grid">
        <div class="color-item"><input type="color" id="cTitle"   value="#d4af37" onchange="schedule()"><label>Título</label></div>
        <div class="color-item"><input type="color" id="cSection" value="#f5c518" onchange="schedule()"><label>Secciones</label></div>
        <div class="color-item"><input type="color" id="cItem"    value="#ffffff" onchange="schedule()"><label>Platos</label></div>
        <div class="color-item"><input type="color" id="cPrice"   value="#d4af37" onchange="schedule()"><label>Precios</label></div>
      </div>
      <div class="color-item" style="gap:.5rem">
        <input type="color" id="cDivider" value="#d4af37" onchange="schedule()">
        <label style="margin-bottom:0">Color de separadores</label>
      </div>
    </div>

    <div class="card">
      <h3>📋 Secciones del menú</h3>
      <div class="cat-list" id="catList"></div>
      <button class="btn-ghost" style="width:100%;margin-top:.6rem" onclick="addCat()">+ Agregar sección</button>
    </div>

    <button class="gen-btn" onclick="renderMenu()">✨ Actualizar imagen</button>

  </div>

  <!-- ═══════════════ PREVIEW ═══════════════ -->
  <div class="preview-panel">
    <p class="preview-label">Vista previa — se actualiza automáticamente</p>
    <img id="previewImg" alt="Vista previa del menú">
    <canvas id="mc"></canvas>
    <button class="dl-btn" onclick="download()">⬇ Descargar imagen PNG</button>
  </div>

</div>

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  buildEditor();
  const img = new Image();
  img.onload = () => { bgImg = img; document.fonts.ready.then(renderMenu); };
  img.src = DEFAULT_BG;
});

// ── Category editor ──────────────────────────────────────────────
function buildEditor() {
  const list = document.getElementById('catList');
  list.innerHTML = '';
  cats.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'cat-card';
    div.innerHTML = `
      <div class="cat-name-row">
        <input type="text" value="${esc(cat.name)}" placeholder="Sección"
          oninput="cats[${ci}].name=this.value;schedule()">
        <button class="btn-del" onclick="delCat(${ci})">✕</button>
      </div>
      <div class="items-list" id="il${ci}">
        ${cat.items.map((it,ii)=>itemHtml(ci,ii,it)).join('')}
      </div>
      <button class="btn-ghost btn-sm" onclick="addItem(${ci})">+ Plato</button>
    `;
    list.appendChild(div);
  });
}

function itemHtml(ci,ii,it){
  return `<div class="item-row">
    <input type="text" value="${esc(it.d)}" placeholder="Nombre del plato"
      oninput="cats[${ci}].items[${ii}].d=this.value;schedule()">
    <input type="text" value="${esc(it.p)}" placeholder="$0"
      oninput="cats[${ci}].items[${ii}].p=this.value;schedule()">
    <button class="btn-del" onclick="delItem(${ci},${ii})">✕</button>
  </div>`;
}

function addCat()       { cats.push({name:'Nueva sección',items:[{d:'Plato',p:'$0'}]}); buildEditor(); schedule(); }
function delCat(ci)     { cats.splice(ci,1); buildEditor(); schedule(); }
function addItem(ci)    { cats[ci].items.push({d:'Nuevo plato',p:'$0'}); buildEditor(); schedule(); }
function delItem(ci,ii) { cats[ci].items.splice(ii,1); buildEditor(); schedule(); }
function esc(s)         { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

// ── Background ───────────────────────────────────────────────────
function loadBg(input) {
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => {
      bgImg = img;
      const z = document.getElementById('uploadZone');
      z.classList.add('ok');
      z.querySelector('p').textContent = '✓ ' + file.name;
      renderMenu();
    };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

// ── Format ───────────────────────────────────────────────────────
function setFmt(f, el) {
  fmt = f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderMenu();
}

// ── Debounce ─────────────────────────────────────────────────────
function schedule() { clearTimeout(timer); timer = setTimeout(renderMenu, 220); }

// ── Main render ──────────────────────────────────────────────────
function renderMenu() {
  const canvas = document.getElementById('mc');
  const ctx    = canvas.getContext('2d');
  const [W,H]  = SIZES[fmt];
  canvas.width = W; canvas.height = H;

  const name     = document.getElementById('restName').value  || 'Mi Restaurante';
  const tagline  = document.getElementById('subtitle').value;
  const opacity  = parseInt(document.getElementById('overlay').value) / 100;
  const cTitle   = document.getElementById('cTitle').value;
  const cSection = document.getElementById('cSection').value;
  const cItem    = document.getElementById('cItem').value;
  const cPrice   = document.getElementById('cPrice').value;
  const cDiv     = document.getElementById('cDivider').value;

  // ── Background ──
  if (bgImg) {
    const sc = Math.max(W/bgImg.width, H/bgImg.height);
    const sw = bgImg.width*sc, sh = bgImg.height*sc;
    ctx.drawImage(bgImg, (W-sw)/2, (H-sh)/2, sw, sh);
  } else {
    const g = ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,'#0d1b2a'); g.addColorStop(1,'#1a2a3a');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  }

  // ── Dark overlay ──
  ctx.fillStyle = `rgba(0,0,0,${opacity})`; ctx.fillRect(0,0,W,H);

  // ── Decorative inner border ──
  const brd = Math.round(W*0.022);
  ctx.strokeStyle = cDiv; ctx.globalAlpha = 0.35; ctx.lineWidth = 1.5;
  ctx.strokeRect(brd, brd, W-brd*2, H-brd*2);
  ctx.globalAlpha = 1;

  // ── Size scale ──
  const totalItems = cats.reduce((s,c)=>s+c.items.length,0);
  const n = totalItems + cats.length;               // rough "lines" of content
  const TS  = clamp(Math.round(W*0.058), 36, 72);  // title
  const TG  = clamp(Math.round(W*0.026), 18, 38);  // tagline
  const SS  = clamp(Math.round(W*0.029), 20, 40);  // section header
  const IS  = clamp(Math.round(W*0.023), 16, 32);  // item

  // Available height after header region
  const headerH = TS*1.5 + (tagline ? TG*1.8 : 0) + H*0.04;
  const footerH = H*0.04;
  const availH  = H - headerH - footerH - brd*2;
  const needH   = cats.length*(SS*2.2) + totalItems*(IS*1.8) + (cats.length-1)*(IS*1.2);
  const sf      = needH > availH ? Math.max(availH/needH, 0.55) : 1;
  const ss      = Math.round(SS*sf), is = Math.round(IS*sf);
  const sGap    = Math.round(SS*sf*2.2), iGap = Math.round(IS*sf*1.75), dGap = Math.round(IS*sf*1.1);

  const PAD = Math.round(W*0.075);
  const CX  = W/2;
  let y = Math.round(H*0.09);

  // ── Restaurant name ──
  ctx.textAlign = 'center';
  ctx.font = `700 ${TS}px "Playfair Display",Georgia,serif`;
  ctx.fillStyle = cTitle;
  setShadow(ctx, 14);
  y = fillWrapped(ctx, name.toUpperCase(), CX, y, W-PAD*2, TS*1.3) + Math.round(TS*0.35);

  // ── Tagline ──
  if (tagline) {
    ctx.font = `italic ${TG}px "Playfair Display",Georgia,serif`;
    ctx.fillStyle = cTitle + 'bb';
    setShadow(ctx, 8);
    ctx.fillText(tagline, CX, y);
    y += Math.round(TG*1.5);
  }

  // ── Top divider ──
  ctx.shadowBlur = 0;
  y += Math.round(H*0.015);
  drawDiv(ctx, PAD, y, W-PAD, cDiv, W);
  y += Math.round(H*0.025);

  // ── Sections ──
  cats.forEach((cat, ci) => {
    // Section title
    ctx.textAlign = 'center';
    ctx.font = `700 ${ss}px "Playfair Display",Georgia,serif`;
    ctx.fillStyle = cSection;
    setShadow(ctx, 8);
    ctx.fillText(`✦  ${cat.name.toUpperCase()}  ✦`, CX, y + Math.round(ss*0.85));
    y += sGap;

    // Items
    cat.items.forEach(it => {
      ctx.shadowBlur = 3;
      drawItem(ctx, it.d, it.p, PAD, y, W-PAD*2, is, iGap*0.82, cItem, cPrice);
      y += iGap;
    });

    // Divider between sections
    if (ci < cats.length-1) {
      ctx.shadowBlur = 0;
      y += Math.round(dGap*0.25);
      drawDiv(ctx, PAD+W*0.06, y, W-PAD-W*0.06, cDiv, W);
      y += dGap;
    }
  });

  // ── Bottom divider ──
  y += Math.round(H*0.015);
  drawDiv(ctx, PAD, y, W-PAD, cDiv, W);

  // ── Update preview ──
  document.getElementById('previewImg').src = canvas.toDataURL('image/jpeg', 0.95);
}

// ── Helpers ──────────────────────────────────────────────────────
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

function setShadow(ctx, blur) {
  ctx.shadowColor = 'rgba(0,0,0,0.85)';
  ctx.shadowBlur  = blur;
  ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;
}

function fillWrapped(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  words.forEach((w,i) => {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line.trim(), x, y);
      line = w + ' ';
      y += lineH;
    } else { line = test; }
  });
  ctx.fillText(line.trim(), x, y);
  return y;
}

function drawItem(ctx, dish, price, x, y, maxW, fs, lineH, ic, pc) {
  // Measure price width
  ctx.font = `700 ${fs}px "Lato",Arial,sans-serif`;
  const pw = ctx.measureText(price).width + fs*0.6;
  const dw = maxW - pw - fs*0.5;

  // Dish name
  ctx.font = `400 ${fs}px "Lato",Arial,sans-serif`;
  ctx.fillStyle = ic; ctx.textAlign = 'left';
  let t = dish;
  while (ctx.measureText(t+'…').width > dw && t.length > 1) t = t.slice(0,-1);
  if (t !== dish) t += '…';
  ctx.fillText(t, x, y+lineH);

  // Price
  ctx.font = `700 ${fs}px "Lato",Arial,sans-serif`;
  ctx.fillStyle = pc; ctx.textAlign = 'right';
  ctx.fillText(price, x+maxW, y+lineH);

  // Dot leader
  const tEnd = x + ctx.measureText(t.replace('…','')).width + (t.endsWith('…') ? ctx.measureText('…').width : 0);
  ctx.setLineDash([2, fs*0.55]);
  ctx.strokeStyle = ic; ctx.lineWidth = 1; ctx.globalAlpha = 0.28;
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(tEnd + fs*0.4, y+lineH - fs*0.22);
  ctx.lineTo(x + maxW - pw, y+lineH - fs*0.22);
  ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha = 1;
}

function drawDiv(ctx, x1, y, x2, color, W) {
  const cx = (x1+x2)/2;
  ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.65;
  ctx.shadowBlur = 0;

  ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(cx-W*0.038,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+W*0.038,y); ctx.lineTo(x2,y); ctx.stroke();

  // Center diamond
  ctx.fillStyle = color; ctx.globalAlpha = 0.9;
  ctx.save(); ctx.translate(cx,y); ctx.rotate(Math.PI/4);
  const d = W*0.007;
  ctx.fillRect(-d,-d,d*2,d*2);
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ── Download ─────────────────────────────────────────────────────
function download() {
  const canvas = document.getElementById('mc');
  const a = document.createElement('a');
  a.download = 'menu-rincondelpuerto.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
